<title>广告墙</title>

<style>
body{font-family:Arial;background:#f5f5f5;}
.container{column-count:4;padding:10px;}
img{width:100%;margin-bottom:10px;border-radius:10px;}
</style>
</head>

<body>

<h2 style="text-align:center;">小区广告展示</h2>

<div class="container" id="gallery"></div>

<script>

// 👉 广告数据（你只需要改这里）
const ads = [
{
  id:"ad1",
  img:"https://picsum.photos/300/400?1",
  tel:"13800138000",
  wechat:"https://weixin.qq.com/"
},
{
  id:"ad2",
  img:"https://picsum.photos/300/400?2",
  tel:"13900139000",
  wechat:"https://weixin.qq.com/"
}
];

// 👉 统计函数
function track(adId,type){
    db.collection("clicks").add({
        adId:adId,
        type:type,
        time:new Date()
    });
}

// 👉 渲染
const box = document.getElementById("gallery");

ads.forEach(ad=>{

    let div = document.createElement("div");

    div.innerHTML = `
        <a href="tel:${ad.tel}" onclick="track('${ad.id}','tel')">
            <img src="${ad.img}">
        </a>

        <div style="text-align:center;">
            <a href="tel:${ad.tel}" onclick="track('${ad.id}','tel')">📞打电话</a> |
            <a href="${ad.wechat}" onclick="track('${ad.id}','wechat')">💬加微信</a>
        </div>
    `;

    box.appendChild(div);
});

</script>

</body>
