<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>照片墙</title>
<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

.container {
    column-count: 5;
    column-gap: 10px;
    padding: 10px;
}

img {
    width: 100%;
    margin-bottom: 10px;
    border-radius: 10px;
    transition: 0.3s;
}

img:hover {
    transform: scale(1.03);
}

.controls {
    text-align: center;
    padding: 20px;
}

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: #333;
}
</style>
</head>

<body>

<div class="container" id="gallery"></div>

<div class="controls">
    <button onclick="prevPage()">上一页</button>
    <span id="pageInfo"></span>
    <button onclick="nextPage()">下一页</button>
</div>

<script>

// ==============================
// 👉👉👉 在这里粘贴你的图片地址 👇👇👇
// ==============================

const images = [

/* 🔥 在这里直接粘贴图片URL，每行一个 */
"https://picsum.photos/300/400?1",

"https://picsum.photos/300/400?3",

// 👉 계속往下加（不限数量）
// 👉 一页自动显示100张

];

// ==============================
// 分页逻辑（无需修改）
// ==============================

let currentPage = 1;
const perPage = 100;

function renderPage() {
    const gallery = document.getElementById("gallery");
    gallery.innerHTML = "";

    let start = (currentPage - 1) * perPage;
    let end = start + perPage;
    let pageImages = images.slice(start, end);

    pageImages.forEach(src => {
        let img = document.createElement("img");
        img.src = src;
        gallery.appendChild(img);
    });

    document.getElementById("pageInfo").innerText =
        "第 " + currentPage + " 页 / 共 " + Math.ceil(images.length / perPage) + " 页";
}

function nextPage() {
    if (currentPage < Math.ceil(images.length / perPage)) {
        currentPage++;
        renderPage();
    }
}

function prevPage() {
    if (currentPage > 1) {
        currentPage--;
        renderPage();
    }
}

renderPage();

</script>

</body>
</html>
